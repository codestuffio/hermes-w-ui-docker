# docker-compose.yml
# Hermes Agent + Hermes WebUI
# Deploy with: docker compose up -d
# For Coolify: paste this as a "Docker Compose" service and set env vars in the env panel.

services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - hermes-home:/opt/data
      - hermes-workspace:/root/workspace
    environment:
      - HERMES_HOME=/opt/data
      # --- Provider API Keys (set at least one) ---
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # --- Messaging gateway tokens ---
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      # --- Optional: default model ---
      - HERMES_DEFAULT_MODEL=${HERMES_DEFAULT_MODEL:-openrouter/anthropic/claude-sonnet-4-5}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M
    security_opt:
      - no-new-privileges:true
    networks:
      - hermes-internal

  webui:
    image: ghcr.io/nesquena/hermes-webui:latest
    container_name: hermes-webui
    restart: unless-stopped
    depends_on:
      hermes:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - hermes-home:/home/hermeswebui/.hermes
      - hermes-workspace:/workspace
    environment:
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      - HERMES_WEBUI_STATE_DIR=/home/hermeswebui/.hermes/webui-mvp
      - HERMES_WEBUI_DEFAULT_WORKSPACE=/workspace
      - HERMES_HOME=/home/hermeswebui/.hermes
      - HERMES_CONFIG_PATH=/home/hermeswebui/.hermes/config.yaml
      # UID/GID for correct file permissions on mounted volumes
      - WANTED_UID=${UID:-1000}
      - WANTED_GID=${GID:-1000}
      # Optional: uncomment to password-protect the web UI
      # - HERMES_WEBUI_PASSWORD=your-secret-password
    ports:
      - "${WEBUI_PORT:-8787}:8787"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks:
      - hermes-internal

volumes:
  hermes-home:
  hermes-workspace:

networks:
  hermes-internal: