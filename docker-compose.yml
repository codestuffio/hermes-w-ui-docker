# docker-compose.yml
# Hermes Agent + Hermes WebUI
# Deploy with: docker compose up -d
# For Coolify: paste this as a "Docker Compose" service and set env vars in the env panel.

services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"
    volumes:
      - hermes-home:/opt/data
    environment:
      - HERMES_HOME=/opt/data
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - HERMES_DEFAULT_MODEL=${HERMES_DEFAULT_MODEL:-openrouter/anthropic/claude-sonnet-4-5}
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    security_opt:
      - no-new-privileges:true
    networks:
      - hermes-internal

  webui:
    image: ghcr.io/nesquena/hermes-webui:latest
    container_name: hermes-webui
    restart: unless-stopped
    depends_on:
      hermes:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - hermes-home:/home/hermeswebui/.hermes
      - hermes-workspace:/workspace
    environment:
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      - HERMES_WEBUI_STATE_DIR=/home/hermeswebui/.hermes/webui-mvp
      - HERMES_WEBUI_DEFAULT_WORKSPACE=/workspace
      - HERMES_HOME=/home/hermeswebui/.hermes
      - HERMES_CONFIG_PATH=/home/hermeswebui/.hermes/config.yaml
      - HERMES_WEBUI_AGENT_DIR=/opt/hermes
      # UID/GID must match the volume ownership (10000 from hermes container)
      - WANTED_UID=10000
      - WANTED_GID=10000
      # Optional: uncomment to password-protect the web UI
      # - HERMES_WEBUI_PASSWORD=your-secret-password
    ports:
      - "${WEBUI_PORT:-8787}:8787"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks:
      - hermes-internal

volumes:
  hermes-home:
  hermes-workspace:

networks:
  hermes-internal: