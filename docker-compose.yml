# docker-compose.yml
# Hermes Agent + Hermes WebUI
# Deploy with: docker compose up -d
# For Coolify: paste this as a "Docker Compose" service and set env vars in the env panel.

services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"
    volumes:
      - hermes-home:/opt/data
      - hermes-agent-src:/opt/hermes
    environment:
      - HERMES_HOME=/opt/data
      - HERMES_INFERENCE_PROVIDER=minimax
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - HERMES_DEFAULT_MODEL=${HERMES_DEFAULT_MODEL:-MiniMax-M2.7}
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    networks:
      - hermes-internal

  webui:
    image: ghcr.io/nesquena/hermes-webui:latest
    container_name: hermes-webui
    restart: unless-stopped
    depends_on:
      hermes:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      - HERMES_WEBUI_STATE_DIR=/tmp/hermes-webui-state
      - HERMES_WEBUI_DEFAULT_WORKSPACE=/tmp/workspace
      - HERMES_HOME=/tmp/.hermes
      - HERMES_CONFIG_PATH=/tmp/.hermes/config.yaml
      - HERMES_WEBUI_AGENT_DIR=/opt/hermes-agent
      - HERMES_WEBUI_BASE_URL=${MINIMAX_BASE_URL}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
    volumes:
      - hermes-agent-src:/opt/hermes-agent:ro
    ports:
      - "${WEBUI_PORT:-8787}:8787"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks:
      - hermes-internal

volumes:
  hermes-home:
  hermes-agent-src:

networks:
  hermes-internal:
